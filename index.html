<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okno do dvora</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Courier New', monospace;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

#scene {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 480px;
    overflow: hidden;
    transition: background 0.6s ease;
}

#scene canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
}

#hud {
    position: absolute;
    top: 14px; left: 16px;
    z-index: 99;
    color: rgba(255,255,255,0.88);
    font-size: 12px;
    line-height: 1.9;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    pointer-events: none;
    transition: opacity 0.4s;
}

#hud-name {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2.5px;
    margin-bottom: 2px;
}

#hud-tag {
    position: absolute;
    top: 14px; right: 16px;
    z-index: 99;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.45);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
}

/* zbytek CSS beze změn */
#panel { background:#111; padding:14px 16px 16px; border-top:1px solid #1e1e1e; }
#tabs { display:flex; margin-bottom:14px; border-bottom:1px solid #1e1e1e; }
.tab { flex:1; padding:7px 0; text-align:center; font-size:10px; color:#3a3a3a; cursor:pointer; border-bottom:2px solid transparent; }
.tab.on { color:#bbb; border-bottom-color:#777; }
.p-on { display:block !important; }
#p-live,#p-test { display:none; }
</style>
</head>

<body>

<div id="scene">
    <canvas id="c-clouds"></canvas>
    <canvas id="c-sun"></canvas>
    <canvas id="c-lp"></canvas>
    <canvas id="c-rain"></canvas>
    <canvas id="c-fog"></canvas>
    <canvas id="c-lightning"></canvas>

    <div id="hud">
        <div id="hud-name">—</div>
        <div id="hud-sub"></div>
    </div>

    <div id="hud-tag">Praha · 50°N 14°E</div>
</div>

<div id="panel">
    <div id="tabs">
        <div class="tab on" id="tab-live" onclick="switchTab('live')">LIVE PRAHA</div>
        <div class="tab" id="tab-test" onclick="switchTab('test')">TEST</div>
    </div>

    <div id="p-live" class="p-on">
        <button id="btn-refresh" onclick="fetchAndRender()">↻ AKTUALIZOVAT</button>
        <div id="live-error" style="display:none;color:#c44">Chyba načítání</div>
    </div>

    <div id="p-test">
        <input type="range" id="sl-temp" min="-10" max="35" value="20" oninput="sliderUpdate()">
    </div>
</div>

<script>
const LAT = 50.1071;
const LON = 14.4473;

const CC = document.getElementById('c-clouds');
const SC = document.getElementById('c-sun');
const RC = document.getElementById('c-rain');
const FC = document.getElementById('c-fog');
const LC = document.getElementById('c-lightning');

const cctx = CC.getContext('2d');
const sctx = SC.getContext('2d');
const rctx = RC.getContext('2d');
const fctx = FC.getContext('2d');
const lctx = LC.getContext('2d');

function W(){ return window.innerWidth; }
function H(){ return window.innerHeight; }

function resize(){
    [CC,SC,RC,FC,LC].forEach(c=>{
        c.width=W(); c.height=H();
    });
}
window.addEventListener('resize',resize);
resize();

/* ===================== WEATHER ===================== */

let currentWeather=null;

function applyWeather(w){
    currentWeather=w;
}

/* ===================== RAIN ===================== */

function drawRain(){
    rctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawRain);
}

/* ===================== CLOUDS ===================== */

function drawClouds(){
    cctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawClouds);
}

/* ===================== SUN ===================== */

function drawSun(){
    sctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawSun);
}

/* ===================== LIGHT POLLUTION ===================== */

function drawLP(){
    lctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawLP);
}

/* ===================== FOG ===================== */

function drawFog(){
    fctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawFog);
}

/* ===================== API ===================== */

async function fetchAndRender(){
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover,wind_speed_10m`;

    const res=await fetch(url);
    const d=await res.json();
    applyWeather({
        temp:d.current.temperature_2m,
        rain:d.current.precipitation,
        cloud:d.current.cloudcover
    });

    document.getElementById('btn-refresh').textContent="↻ OK";
}

/* ===================== INIT ===================== */

drawRain();
drawClouds();
drawSun();
drawLP();
drawFog();

fetchAndRender();
</script>

</body>
</html>
