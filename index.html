<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okno do dvora</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Courier New', monospace;
    background: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* ── SCENE ── */
#scene {
    position: relative;
    width: 100%;
    flex: 1;
    overflow: hidden;
    cursor: none;
}
#c-main {
    display: block;
    width: 100%; height: 100%;
    will-change: transform;
    image-rendering: auto;
}

/* ── HUD — pouze v test módu ── */
#hud {
    position: absolute;
    top: 14px; left: 16px;
    z-index: 99;
    color: rgba(255,255,255,0.88);
    font-size: 12px;
    line-height: 1.9;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    pointer-events: none;
    display: none;
}
#hud-name {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2.5px;
    margin-bottom: 2px;
}
#hud-tag {
    position: absolute;
    top: 14px; right: 16px;
    z-index: 99;
    font-size: 9px; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.45);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
    display: none;
}

/* ── Hint pro přepnutí (live mód, zmizí po 4s) ── */
#hint {
    position: absolute;
    bottom: 18px; left: 50%;
    transform: translateX(-50%);
    z-index: 99;
    font-size: 9px; letter-spacing: 2px;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    transition: opacity 1s;
}

/* ── FPS (test mód) ── */
#fps {
    position: absolute; bottom: 4px; right: 8px;
    font-size: 9px; color: rgba(255,255,255,0.22);
    z-index: 99; pointer-events: none;
    display: none;
}

/* ── PANEL — pouze v test módu ── */
#panel {
    background: #111;
    padding: 14px 16px 16px;
    border-top: 1px solid #1e1e1e;
    flex-shrink: 0;
    display: none;
}
#tabs {
    display: flex;
    margin-bottom: 14px;
    border-bottom: 1px solid #1e1e1e;
}
.tab {
    flex: 1; padding: 7px 0; text-align: center;
    font-size: 10px; letter-spacing: 1.5px;
    color: #3a3a3a; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s; user-select: none;
