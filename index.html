<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okno do dvora</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Courier New', monospace;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ── SCENE ── */
#scene {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 480px;
    overflow: hidden;
    transition: background 0.6s ease;
}

#scene canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
}

#hud {
    position: absolute;
    top: 14px; left: 16px;
    z-index: 99;
    color: rgba(255,255,255,0.88);
    font-size: 12px;
    line-height: 1.9;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    pointer-events: none;
}

#hud-name {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2.5px;
    margin-bottom: 2px;
}

.live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ff5555;
    margin-right: 6px;
    animation: blink 1.4s infinite;
    vertical-align: middle;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.15; }
}

#hud-tag {
    position: absolute;
    top: 14px; right: 16px;
    z-index: 99;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.45);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
}

/* ── PANEL ── */
#panel {
    background: #111;
    padding: 14px 16px 16px;
    border-top: 1px solid #1e1e1e;
}

#tabs {
    display: flex;
    margin-bottom: 14px;
    border-bottom: 1px solid #1e1e1e;
}

.tab {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: #3a3a3a;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
    font-family: inherit;
}

.tab.on  { color: #bbb; border-bottom-color: #777; }
.tab:hover:not(.on) { color: #777; }

#p-live, #p-test { display: none; }
.p-on { display: block !important; }

.stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 10px;
}

.stat {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 5px;
    padding: 8px 10px;
    text-align: center;
}

.stat-lbl {
    font-size: 8px;
    color: #3a3a3a;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
}

.stat-val {
    font-size: 18px;
    color: #aaa;
    font-weight: bold;
}

.stat-unit {
    font-size: 8px;
    color: #444;
}

#btn-refresh {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    color: #555;
    font-size: 9px;
    letter-spacing: 2px;
    cursor: pointer;
}

</style>
</head>
<body>

<div id="scene">
    <canvas id="c-clouds"></canvas>
    <canvas id="c-sun"></canvas>
    <canvas id="c-rain"></canvas>
    <canvas id="c-fog"></canvas>
    <canvas id="c-lightning"></canvas>

    <div id="hud">
        <div id="hud-name">—</div>
        <div id="hud-sub"></div>
    </div>
    <div id="hud-tag">Praha · 50°N 14°E</div>
</div>

<div id="panel">
    <div id="tabs">
        <div class="tab on" onclick="switchTab('live')">LIVE</div>
        <div class="tab" onclick="switchTab('test')">TEST</div>
    </div>
</div>

<script>

// ───────── FPS LIMIT ─────────
let lastFrame = 0;
const FPS = 30;
const FRAME_INTERVAL = 1000 / FPS;

// ───────── REDUKCE ZÁTĚŽE ─────────
const STAR_COUNT = 45;
const RAIN_COUNT = 220;
const FOG_COUNT = 32;

// ───────── STAV ─────────
let stars = null;
let cloudBands = [];
let fogPuffs = [];
let drops = [];

// ───────── CANVAS ─────────
const scene = document.getElementById('scene');
const CC = document.getElementById('c-clouds');
const SC = document.getElementById('c-sun');
const RC = document.getElementById('c-rain');
const FC = document.getElementById('c-fog');

const cctx = CC.getContext('2d');
const sctx = SC.getContext('2d');
const rctx = RC.getContext('2d');
const fctx = FC.getContext('2d');

function W(){return scene.clientWidth;}
function H(){return scene.clientHeight;}

// ───────── FPS GUARD ─────────
function fpsGate(time){
    if (time - lastFrame < FRAME_INTERVAL) return false;
    lastFrame = time;
    return true;
}

// ───────── STARS INIT ─────────
function initStars(){
    stars = [];
    for(let i=0;i<STAR_COUNT;i++){
        stars.push([
            Math.random()*W(),
            Math.random()*H()*0.7,
            Math.random()*1.5+0.3
        ]);
    }
}

// ───────── CLOUDS ─────────
function drawClouds(time){
    if(!fpsGate(time)){
        requestAnimationFrame(drawClouds);
        return;
    }

    cctx.clearRect(0,0,W(),H());

    requestAnimationFrame(drawClouds);
}

// ───────── FOG ─────────
function drawFog(time){
    if(!fpsGate(time)){
        requestAnimationFrame(drawFog);
        return;
    }

    fctx.clearRect(0,0,W(),H());

    requestAnimationFrame(drawFog);
}

// ───────── SUN ─────────
function drawSun(time){
    if(!fpsGate(time)){
        requestAnimationFrame(drawSun);
        return;
    }

    sctx.clearRect(0,0,W(),H());

    requestAnimationFrame(drawSun);
}

// ───────── INIT ─────────
initStars();
requestAnimationFrame(drawClouds);
requestAnimationFrame(drawFog);
requestAnimationFrame(drawSun);

</script>

</body>
</html>
