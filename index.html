<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okno do dvora</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Courier New', monospace;
    background: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* ── SCENE ── */
#scene {
    position: relative;
    width: 100%;
    flex: 1;
    overflow: hidden;
    cursor: none;
}
#c-main {
    display: block;
    width: 100%; height: 100%;
    will-change: transform;
    image-rendering: auto;
}

/* ── HUD — pouze v test módu ── */
#hud {
    position: absolute;
    top: 14px; left: 16px;
    z-index: 99;
    color: rgba(255,255,255,0.88);
    font-size: 12px;
    line-height: 1.9;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    pointer-events: none;
    display: none;   /* skryto v live */
}
#hud-name {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2.5px;
    margin-bottom: 2px;
}
#hud-tag {
    position: absolute;
    top: 14px; right: 16px;
    z-index: 99;
    font-size: 9px; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.45);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
    display: none;   /* skryto v live */
}

/* ── Hint pro přepnutí (live mód, zmizí po 4s) ── */
#hint {
    position: absolute;
    bottom: 18px; left: 50%;
    transform: translateX(-50%);
    z-index: 99;
    font-size: 9px; letter-spacing: 2px;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    transition: opacity 1s;
}

/* ── FPS (test mód) ── */
#fps {
    position: absolute; bottom: 4px; right: 8px;
    font-size: 9px; color: rgba(255,255,255,0.22);
    z-index: 99; pointer-events: none;
    display: none;
}

/* ── PANEL — pouze v test módu ── */
#panel {
    background: #111;
    padding: 14px 16px 16px;
    border-top: 1px solid #1e1e1e;
    flex-shrink: 0;
    display: none;   /* skryto v live */
}
#tabs {
    display: flex;
    margin-bottom: 14px;
    border-bottom: 1px solid #1e1e1e;
}
.tab {
    flex: 1; padding: 7px 0; text-align: center;
    font-size: 10px; letter-spacing: 1.5px;
    color: #3a3a3a; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s; user-select: none;
    font-family: inherit;
}
.tab.on { color: #bbb; border-bottom-color: #777; }
.tab:hover:not(.on) { color: #777; }

#p-test { display: block; }

.sl-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.sl-row label { font-size:9px; color:#444; letter-spacing:1px; min-width:74px; }
.sl-row input[type=range] { flex:1; accent-color:#777; height:3px; }
.sl-val { font-size:10px; color:#999; min-width:40px; text-align:right; }

#presets { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
.p-btn {
    padding:4px 9px; font-size:8px; letter-spacing:1px;
    background:#161616; border:1px solid #252525;
    border-radius:3px; color:#3a3a3a; cursor:pointer;
    transition:all .2s; font-family:inherit;
}
.p-btn:hover { color:#888; border-color:#3a3a3a; }
.p-btn.on { color:#ccc; border-color:#555; background:#1e1e1e; }

/* test mód badge */
#test-badge {
    position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    font-size: 8px; letter-spacing: 2px;
    color: rgba(255,200,60,0.5);
    z-index: 99; pointer-events: none;
    display: none;
}
</style>
</head>
<body>

<div id="scene">
    <canvas id="c-main"></canvas>

    <!-- HUD — viditelné pouze v test módu -->
    <div id="hud">
        <div id="hud-name">—</div>
        <div id="hud-sub"></div>
    </div>
    <div id="hud-tag">Praha · 50°N 14°E</div>
    <div id="test-badge">◎ TEST REŽIM</div>
    <div id="fps"></div>

    <!-- Hint pro živý mód — zmizí po 4s -->
    <div id="hint">T — test režim</div>
</div>

<!-- PANEL — viditelný pouze v test módu -->
<div id="panel">
    <div id="tabs">
        <div class="tab on" id="tab-test">◎ TEST REŽIM</div>
        <div class="tab" id="tab-back" onclick="switchToLive()">← LIVE</div>
    </div>
    <div id="p-test">
        <div class="sl-row">
            <label>HODINA</label>
            <input type="range" id="sl-hour"  min="0" max="23" step="0.5" value="12" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-hour">12:00</span>
        </div>
        <div class="sl-row">
            <label>TEPLOTA</label>
            <input type="range" id="sl-temp"  min="-15" max="40" step="1" value="20" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-temp">20°C</span>
        </div>
        <div class="sl-row">
            <label>OBLAČNOST</label>
            <input type="range" id="sl-cloud" min="0" max="100" step="1" value="20" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-cloud">20%</span>
        </div>
        <div class="sl-row">
            <label>SRÁŽKY (mm/h)</label>
            <input type="range" id="sl-rain"  min="0" max="30" step="0.1" value="0" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-rain">0.0</span>
        </div>
        <div class="sl-row">
            <label>VÍTR (směr)</label>
            <input type="range" id="sl-wind"  min="-1" max="1" step="0.05" value="0" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-wind">0.00</span>
        </div>
        <div id="presets"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// KONFIGURACE
// ═══════════════════════════════════════════════════════
const LAT = 50.1071, LON = 14.4473;
const SUNRISE = 6, SUNSET = 20, TWILIGHT = 2;
const TARGET_FPS = 30;
const FRAME_MS   = 1000 / TARGET_FPS;

// Intenzity deště — počet kapek a vizuální styl
// rain mm/h:  0.1–2 = mrholení, 2–8 = déšť, 8–20 = silný déšť, 20+ = průtrž
function rainLevel(mm) {
    if (mm <= 0.1)  return 0;   // žádný
    if (mm <= 2)    return 1;   // mrholení
    if (mm <= 8)    return 2;   // déšť
    if (mm <= 20)   return 3;   // silný déšť
    return 4;                   // průtrž / bouřka
}
const RAIN_DROPS   = [0, 120, 280, 450, 650];
const RAIN_LEN     = [0, 12,  28,  45,  58 ];
const RAIN_SPEED   = [0, [1.5,4], [3,9], [6,14], [9,18]];
const RAIN_ALPHA   = [0, .45, .65, .80, .92];
const RAIN_WIDTH   = [0, 1,   1.5, 2,   2  ];

const PRESETS = [
    { name:"VEDRO",      temp:35,  rain:0,    cloud:5,   wind:0,    hour:15 },
    { name:"JASNO",      temp:28,  rain:0,    cloud:10,  wind:0.2,  hour:9  },
    { name:"POLOJASNO",  temp:24,  rain:0,    cloud:35,  wind:0.15, hour:16 },
    { name:"JASNÁ NOC",  temp:12,  rain:0,    cloud:0,   wind:0.1,  hour:1  },
    { name:"OBLAČNO",    temp:16,  rain:0,    cloud:75,  wind:-0.5, hour:18 },
    { name:"MLHA",       temp:4,   rain:0,    cloud:98,  wind:0,    hour:5  },
    { name:"MRHOLENÍ",   temp:12,  rain:0.8,  cloud:80,  wind:0.3,  hour:10 },
    { name:"DÉŠŤ",       temp:14,  rain:4,    cloud:85,  wind:0.8,  hour:13 },
    { name:"SILNÝ DÉŠŤ", temp:16,  rain:14,   cloud:95,  wind:0.9,  hour:17 },
    { name:"BOUŘE",      temp:19,  rain:25,   cloud:100, wind:1,    hour:21 },
    { name:"SNÍH",       temp:-3,  rain:0.7,  cloud:100, wind:-0.3, hour:9  }
];

// ═══════════════════════════════════════════════════════
// STAV POČASÍ
// ═══════════════════════════════════════════════════════
let W = {};
let raining = false, precipType = null;

// ═══════════════════════════════════════════════════════
// CANVAS SETUP — jediný canvas, jeden kontext
// ═══════════════════════════════════════════════════════
const sceneEl = document.getElementById('scene');
const canvas  = document.getElementById('c-main');
const ctx     = canvas.getContext('2d', {
    alpha: false,           // žádná průhlednost na hlavním canvasu = rychlejší composite
    desynchronized: true    // na Pi redukuje latenci
});

let CW = 0, CH = 0;

function resize() {
    CW = sceneEl.clientWidth;
    CH = sceneEl.clientHeight || window.innerHeight - document.getElementById('panel').offsetHeight;
    canvas.width  = CW;
    canvas.height = CH;
    invalidateGradientCache();
    initStars();
    rebuildCloudCache();
}

window.addEventListener('resize', resize);
// Počkej na DOM aby panel měl správnou výšku
setTimeout(resize, 50);

// ═══════════════════════════════════════════════════════
// MATH HELPERS
// ═══════════════════════════════════════════════════════
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const lerp  = (a,b,t) => a + (b-a)*t;

function getDL(h) {
    const ss=SUNRISE-TWILIGHT, se=SUNRISE+TWILIGHT;
    const ds=SUNSET-TWILIGHT,  de=SUNSET+TWILIGHT;
    if (h<ss||h>=de) return 0;
    if (h>=se&&h<ds) return 1;
    if (h<se) return clamp((h-ss)/(se-ss),0,1);
    return clamp(1-(h-ds)/(de-ds),0,1);
}

function getBG(temp, cloud) {
    const b = temp>=30?[250,153,35]:temp>=20?[255,210,120]:
              temp>=10?[180,210,255]:temp>0?[160,190,255]:[200,220,255];
    const m = (cloud/100)*0.6;
    return b.map(c=>Math.round(c+(255-c)*m));
}

function applyLight(rgb, dl) {
    const f = lerp(0.04, 1, dl);   // 0.04 = tmavší noc
    return rgb.map(c=>Math.round(c*f));
}

// ═══════════════════════════════════════════════════════
// MÓD: live (fullscreen, čistý) / test (panel + HUD)
// ═══════════════════════════════════════════════════════
let mode = 'live';
let liveTimer = null;

function setLiveMode() {
    mode = 'live';
    document.getElementById('panel').style.display   = 'none';
    document.getElementById('hud').style.display     = 'none';
    document.getElementById('hud-tag').style.display = 'none';
    document.getElementById('fps').style.display     = 'none';
    document.getElementById('test-badge').style.display = 'none';
    document.getElementById('scene').style.cursor    = 'none';
    // Trigger resize — canvas zabere celou výšku
    setTimeout(resize, 30);
}

function setTestMode() {
    mode = 'test';
    document.getElementById('panel').style.display   = 'block';
    document.getElementById('hud').style.display     = 'block';
    document.getElementById('hud-tag').style.display = 'block';
    document.getElementById('fps').style.display     = 'block';
    document.getElementById('test-badge').style.display = 'block';
    document.getElementById('scene').style.cursor    = 'default';
    setTimeout(resize, 30);
    sliderUpdate();
}

function switchToLive() {
    if (liveTimer) clearInterval(liveTimer);
    setLiveMode();
    fetchAndRender();
    liveTimer = setInterval(fetchAndRender, 60000);
}

// T = přepnout do test módu, ESC = zpět do live
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && mode === 'test') { switchToLive(); return; }
    if ((e.key === 't' || e.key === 'T') && mode === 'live') { setTestMode(); return; }
    // šipky v test módu
    if (mode !== 'test') return;
    const btns = [...document.querySelectorAll('.p-btn')];
    const cur  = btns.findIndex(b => b.classList.contains('on'));
    let next   = cur;
    if (e.key === 'ArrowRight') next = (cur+1) % btns.length;
    if (e.key === 'ArrowLeft')  next = (cur-1+btns.length) % btns.length;
    if (next !== cur) btns[next].click();
});

// Trojklik na scénu = test mód (pro dotykové/myš bez klávesnice)
let clickCount = 0, clickTimer = null;
document.getElementById('scene').addEventListener('click', () => {
    clickCount++;
    if (clickTimer) clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { clickCount = 0; }, 600);
    if (clickCount >= 3) {
        clickCount = 0;
        if (mode === 'live') setTestMode();
        else switchToLive();
    }
});

// Hint zmizí po 4 sekundách
setTimeout(() => {
    const h = document.getElementById('hint');
    h.style.opacity = '0';
    setTimeout(() => h.style.display = 'none', 1000);
}, 4000);

// cloud state (interpoluje se pomalu)
let cDensity=0, cWind=0, cStorm=0, cDL=1;
// fog state
let fDensity=0, fWind=0;

// ═══════════════════════════════════════════════════════
// DETEKTOR POČASÍ
// ═══════════════════════════════════════════════════════
const isSnow = s => (s.temp||10)<=0 || s.name==='SNÍH';
const isFog  = s => (s.cloud||0)>=95 || s.name==='MLHA';

function guessName(temp,rain,cloud) {
    if(temp<=0&&rain>0)   return 'SNÍH';
    if(rain>3&&cloud>90)  return 'BOUŘE';
    if(rain>0.1)          return 'DÉŠŤ';
    if(cloud>=95)         return 'MLHA';
    if(cloud>70)          return 'OBLAČNO';
    if(cloud>30)          return 'POLOJASNO';
    if(temp>=30)          return 'VEDRO';
    return 'JASNO';
}

// ═══════════════════════════════════════════════════════
// MRAKY — pre-renderované do OffscreenCanvas
// Cache se invaliduje pouze při resize nebo změně počasí
// ═══════════════════════════════════════════════════════
const NUM_CLOUDS = 7;
let cloudBands = [];
let cloudOSC   = null;   // OffscreenCanvas pro jeden cloud band
let cloudCacheValid = false;

function rebuildCloudCache() {
    // Jeden "vzorový" mrak renderujeme do offscreen canvasu
    // pak ho opakovaně blitujeme s různými pozicemi — žádné gradienty per-frame
    cloudCacheValid = false;
}

function ensureCloudCache(shade) {
    // Vytvoří OffscreenCanvas 500x200 s jedním oblakem (gradient jednou)
    if (cloudCacheValid && cloudOSC) return;
    const W2 = 500, H2 = 200;
    cloudOSC = new OffscreenCanvas(W2, H2);
    const octx = cloudOSC.getContext('2d');
    octx.clearRect(0,0,W2,H2);
    const col = `${shade},${Math.min(shade+3,255)},${Math.min(shade+6,255)}`;
    const g1 = octx.createLinearGradient(0,0,W2,H2*0.15);
    g1.addColorStop(0,   `rgba(${col},0)`);
    g1.addColorStop(.18, `rgba(${col},.08)`);
    g1.addColorStop(.5,  `rgba(${col},.22)`);
    g1.addColorStop(.82, `rgba(${col},.08)`);
    g1.addColorStop(1,   `rgba(${col},0)`);
    octx.fillStyle = g1;
    octx.beginPath();
    octx.ellipse(W2/2, H2/2, W2*0.48, H2*0.45, 0, 0, Math.PI*2);
    octx.fill();
    const g2 = octx.createLinearGradient(W2/2,0,W2/2,H2);
    g2.addColorStop(0,   `rgba(${col},0)`);
    g2.addColorStop(.35, `rgba(${col},.08)`);
    g2.addColorStop(.5,  `rgba(${col},.13)`);
    g2.addColorStop(1,   `rgba(${col},0)`);
    octx.fillStyle = g2;
    octx.beginPath();
    octx.ellipse(W2/2, H2/2, W2*0.42, H2*0.72, 0, 0, Math.PI*2);
    octx.fill();
    cloudCacheValid = true;
}

function initClouds() {
    cloudBands = [];
    for (let i=0;i<NUM_CLOUDS;i++) {
        const layer = i%3;
        cloudBands.push({
            x: Math.random()*(CW+600)-300,
            y: CH*(0.08+layer*0.14)+Math.random()*CH*0.08,
            w: Math.random()*500+900,
            h: Math.random()*120+140,
            speed: .03+Math.random()*.06,
            wobble: Math.random()*Math.PI*2,
            dY: (Math.random()-.5)*.015,
            layer, alpha: 0
        });
    }
}

function drawClouds(t) {
    if (cDensity<=0.02) return;

    const shade = Math.round(lerp(244,196,cStorm)*lerp(0.68,1,cDL));
    ensureCloudCache(shade);

    const wp = cWind*0.12;

    for (const b of cloudBands) {
        b.x += b.speed + wp*(1+b.layer*.18);
        b.y += b.dY + Math.sin(t*.08+b.wobble)*.015;

        if (b.x-b.w>CW+300) { b.x=-b.w-Math.random()*260; b.y=CH*(0.08+b.layer*.14)+Math.random()*CH*.08; }
        if (b.x+b.w<-320)   { b.x=CW+b.w+Math.random()*260; b.y=CH*(0.08+b.layer*.14)+Math.random()*CH*.08; }

        const pulse  = .95+Math.sin(t*(.06+b.layer*.015)+b.wobble)*.04;
        // Zjemněná alpha: 0.52→0.42, cap 200→160
        const alpha  = clamp(cDensity*0.07*(0.42+b.layer*.05)*pulse, 0, .63);

        ctx.globalAlpha = alpha;
        ctx.drawImage(cloudOSC,
            b.x - b.w*0.52, b.y - b.h*0.52,
            b.w*1.04, b.h*1.04
        );
        ctx.globalAlpha = 1;
    }

    // Globální cloud overlay — jeden fillRect místo více volání
    const ovA = cDensity*0.06*(1-cDL*.25)*0.18;
    if (ovA>0.005) {
        const sh2 = Math.round(lerp(244,196,cStorm)*lerp(.68,1,cDL));
        ctx.fillStyle = `rgba(${sh2},${sh2},${sh2},${ovA})`;
        ctx.fillRect(0,0,CW,CH*.78);
    }
}

// ═══════════════════════════════════════════════════════
// MLHA — pre-renderované kruhy do OffscreenCanvas
// ═══════════════════════════════════════════════════════
const NUM_FOG = 32;   // sníženo z 64 — Pi 4 zvládá pohodlně
let fogPuffs = [];
let fogOSC   = {};    // cache kruhů podle poloměru

function getFogCircle(r) {
    const key = Math.round(r/10)*10;  // kvantizace → sdílení cache
    if (fogOSC[key]) return fogOSC[key];
    const size = r*2+2;
    const osc  = new OffscreenCanvas(size, size);
    const oc   = osc.getContext('2d');
    const g    = oc.createRadialGradient(r,r,r*.12,r,r,r);
    g.addColorStop(0,   'rgba(245,248,250,1)');
    g.addColorStop(.55, 'rgba(245,248,250,.68)');
    g.addColorStop(1,   'rgba(245,248,250,0)');
    oc.fillStyle = g;
    oc.beginPath(); oc.arc(r,r,r,0,Math.PI*2); oc.fill();
    fogOSC[key] = osc;
    return osc;
}

function invalidateGradientCache() {
    fogOSC = {};
    cloudCacheValid = false;
}

function initFog() {
    fogPuffs = [];
    for (let i=0;i<NUM_FOG;i++) {
        const layer = i%3;
        const sc    = layer===0?1.25:layer===1?1:.82;
        fogPuffs.push({
            x: Math.random()*CW,
            y: Math.random()*CH,
            r: Math.round((Math.random()*180+140)*sc),
            bA: .03+Math.random()*.04,
            sp: .08+Math.random()*.2,
            wb: Math.random()*Math.PI*2,
            dY: (Math.random()-.5)*.12,
            layer
        });
    }
}

function drawFog(t) {
    if (fDensity<=0.01) return;
    const bo  = fDensity*.5;
    const wp  = fWind*.42;

    for (const p of fogPuffs) {
        p.x += p.sp*1.35 + wp*(1+p.layer*.45);
        p.y += p.dY*1.4  + Math.sin(t*.42+p.wb)*.08;

        if (p.x-p.r>CW+80)    { p.x=-p.r-Math.random()*120; p.y=Math.random()*CH; }
        if (p.x+p.r<-120)     { p.x=CW+p.r+Math.random()*120; p.y=Math.random()*CH; }
        if (p.y<-p.r)           p.y=CH+p.r;
        if (p.y>CH+p.r)         p.y=-p.r;

        const pulse = .8+Math.sin(t*(.42+p.layer*.1)+p.wb)*.24;
        const alpha = p.bA*bo*pulse;
        if (alpha<.008) continue;

        const osc = getFogCircle(p.r);
        ctx.globalAlpha = alpha;
        ctx.drawImage(osc, Math.round(p.x-p.r), Math.round(p.y-p.r));
        ctx.globalAlpha = 1;
    }

    // Celoplošný overlay mlhy — jeden call
    ctx.fillStyle = `rgba(245,248,250,${bo*.18})`;
    ctx.fillRect(0,0,CW,CH);
}

// ═══════════════════════════════════════════════════════
// SVĚTELNÝ SMOG
// ═══════════════════════════════════════════════════════
function drawSmog(t, dl, cloud) {
    const nightF = clamp(1-dl/.4,0,1);
    const boost  = clamp(cloud/100*.6,0,.6);
    const intens = nightF*(.55+boost);
    if (intens<.01) return;

    const pulse = .92+Math.sin(t*.18)*.08;

    // Pre-compute gradient jednou per-frame (rychlé, jeden fillRect s gradientem)
    const bandH = Math.round(CH*.55);
    const g = ctx.createLinearGradient(0,CH-bandH,0,CH);
    g.addColorStop(0,   `rgba(255,175,80,0)`);
    g.addColorStop(.45, `rgba(255,155,60,${intens*pulse*.12})`);
    g.addColorStop(.78, `rgba(255,140,50,${intens*pulse*.2})`);
    g.addColorStop(1,   `rgba(255,130,45,${intens*pulse*.26})`);
    ctx.fillStyle = g;
    ctx.fillRect(0,CH-bandH,CW,bandH);
}

// ═══════════════════════════════════════════════════════
// HVĚZDY — statické pozice, překreslení pouze potřeba
// ═══════════════════════════════════════════════════════
let starsList = [];
function initStars() {
    starsList = [];
    for (let i=0;i<90;i++) {
        starsList.push([
            Math.random()*CW,
            Math.random()*CH*.72,
            Math.random()*1.5+.3,
            Math.random()*Math.PI*2
        ]);
    }
}

function drawStars(t, dl, cloud) {
    if (dl>=.15) return;
    const nightT = 1-dl/.15;
    const vis    = Math.max(0, 1-cloud/100*2.2);
    if (vis<.01) return;

    for (const [sx,sy,sr,sp] of starsList) {
        const twinkle = .5+Math.sin(t*1.3+sp)*.5;
        const a = nightT*(.25+.55*twinkle)*vis;
        if (a<.01) continue;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.beginPath();
        ctx.arc(sx,sy,sr,0,Math.PI*2);
        ctx.fill();
    }
}

// ═══════════════════════════════════════════════════════
// SLUNCE + MĚSÍC
// ═══════════════════════════════════════════════════════
function drawSunMoon(t, dl, cloud, hour) {
    const cf = cloud/100;
    const sunT = clamp((hour-6)/14,0,1);
    const sunX = CW*.1 + CW*.8*sunT;
    const sunY = CH*.55 - Math.sin(sunT*Math.PI)*CH*.48;

    if (dl>.05 && cf<.88) {
        const op = (1-cf)*dl*.92;
        const g  = ctx.createRadialGradient(sunX,sunY,6,sunX,sunY,70);
        g.addColorStop(0,  `rgba(255,240,180,${op*.55})`);
        g.addColorStop(.45,`rgba(255,220,100,${op*.18})`);
        g.addColorStop(1,  'rgba(255,200,80,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(sunX,sunY,70,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgba(255,242,165,${op})`;
        ctx.beginPath(); ctx.arc(sunX,sunY,18,0,Math.PI*2); ctx.fill();
    }

    if (dl<.15) {
        const nightT = 1-dl/.15;
        drawStars(t, dl, cloud);

        const moonRaw = hour<6?hour+24:hour;
        const moonT   = clamp((moonRaw-20)/14,0,1);
        const moonX   = CW*.08+CW*.84*moonT;
        const moonY   = CH*.58-Math.sin(moonT*Math.PI)*CH*.45;
        const moonOp  = nightT*Math.max(0,1-cf*1.6)*.9;

        if (moonOp>.02) {
            const mg = ctx.createRadialGradient(moonX,moonY,3,moonX,moonY,30);
            mg.addColorStop(0,`rgba(220,235,255,${moonOp*.45})`);
            mg.addColorStop(1,'rgba(200,220,255,0)');
            ctx.fillStyle = mg;
            ctx.beginPath(); ctx.arc(moonX,moonY,30,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = `rgba(230,240,255,${moonOp})`;
            ctx.beginPath(); ctx.arc(moonX,moonY,11,0,Math.PI*2); ctx.fill();
        }
    }
}

// ═══════════════════════════════════════════════════════
// SRÁŽKY — přímé kreslení (rain je ve skutečnosti levné)
// ═══════════════════════════════════════════════════════
const NUM_DROPS = 650;  // max pool — sdílený, aktivní kapky dle intenzity
let drops = [];

function createDrop(snow, lvl) {
    const sp = snow ? [1.5,1.7] : (RAIN_SPEED[lvl]||[3,9]);
    return {
        x:  Math.random()*(CW+240)-120,
        y:  Math.random()*(CH+240)-240,
        l:  snow ? 0 : RAIN_LEN[lvl] * (.7+Math.random()*.6),
        s:  sp[0] + Math.random()*(sp[1]-sp[0]),
        r:  snow ? Math.random()*2.2+1.2 : 0,
        dr: snow ? Math.random()*.6+.2 : 0
    };
}

function initRain() {
    const snow = isSnow(W);
    const lvl  = snow ? 2 : rainLevel(W.rain||0);
    const count = snow ? 280 : RAIN_DROPS[lvl];
    drops = [];
    for (let i=0; i<count; i++) drops.push(createDrop(snow, lvl));
}

function drawRain() {
    const snow = isSnow(W);
    const lvl  = snow ? 2 : rainLevel(W.rain||0);
    if (!raining || !drops.length || lvl===0) return;

    const wind  = W.wind||0;
    const angle = wind*8;
    const alpha = snow ? .85 : RAIN_ALPHA[lvl];
    const lw    = snow ? 1   : RAIN_WIDTH[lvl];

    if (snow) {
        ctx.fillStyle = `rgba(235,240,245,${alpha})`;
    } else {
        // Barevný nádech dle intenzity: slabý = šedomodrá, silný = tmavě modrošedá
        const r = lvl<=2 ? 140 : 110;
        const g = lvl<=2 ? 165 : 130;
        const b = lvl<=2 ? 195 : 160;
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.lineWidth   = lw;
        ctx.beginPath();
    }

    for (const d of drops) {
        if (snow) {
            ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
            d.y += d.s; d.x += wind*d.dr;
        } else {
            ctx.moveTo(d.x,d.y); ctx.lineTo(d.x+angle, d.y+d.l);
            d.y += d.s; d.x += wind*2;
        }
        const pad=120;
        if (d.y>CH+pad||d.x<-pad*2||d.x>CW+pad*2) {
            const nd=createDrop(snow, lvl);
            d.x=Math.random()*(CW+pad*2)-pad; d.y=-Math.random()*pad;
            d.l=nd.l; d.s=nd.s; d.r=nd.r; d.dr=nd.dr;
        }
    }
    if (!snow) ctx.stroke();

    // Mlžný overlay pro průtrž (lvl 4)
    if (lvl===4 && !snow) {
        ctx.fillStyle='rgba(160,175,190,0.06)';
        ctx.fillRect(0,0,CW,CH);
    }
}

// ═══════════════════════════════════════════════════════
// BLESK
// ═══════════════════════════════════════════════════════
let lightAlpha=0, lightTimer=0, lightPhase=0;

function triggerLightning() {
    lightAlpha=.9; lightPhase=0; lightTimer=performance.now();
}

function drawLightning(now) {
    if (lightAlpha<=0) return;
    const elapsed=now-lightTimer;
    if (lightPhase===0&&elapsed>120) { lightAlpha=0; lightPhase=1; lightTimer=now; }
    else if (lightPhase===1&&elapsed>60) {
        if (Math.random()>.5) { lightAlpha=.6; lightPhase=2; lightTimer=now; }
        else lightAlpha=0;
    }
    else if (lightPhase===2&&elapsed>80) lightAlpha=0;

    if (lightAlpha>0) {
        ctx.fillStyle=`rgba(255,255,255,${lightAlpha})`;
        ctx.fillRect(0,0,CW,CH);
    }
}

// ═══════════════════════════════════════════════════════
// RENDER LOOP — JEDINÁ requestAnimationFrame smyčka
// ═══════════════════════════════════════════════════════
let lastFrame = 0;
let t0 = performance.now();
let fpsArr = [], lastFpsTime = 0;

function frame(now) {
    requestAnimationFrame(frame);

    // FPS cap — na Pi šetří CPU/GPU teplo
    if (now - lastFrame < FRAME_MS - 2) return;
    const dt = now - lastFrame;
    lastFrame = now;

    // FPS display
    fpsArr.push(1000/dt);
    if (fpsArr.length>20) fpsArr.shift();
    if (now-lastFpsTime>1000) {
        const avg=Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
        document.getElementById('fps').textContent=avg+' fps';
        lastFpsTime=now;
    }

    if (!W.name) return;

    const t    = (now-t0)*.001;
    const hour = W.hour??12;
    const dl   = getDL(hour);
    const cloud= W.cloud||0;

    // ── 1. POZADÍ (plná plocha, žádná průhlednost) ──
    let bc = getBG(W.temp||15, cloud);
    if (isSnow(W)) bc=[Math.round(bc[0]*.72),Math.round(bc[1]*.76),Math.round(bc[2]*.84)];
    const fc = applyLight(bc, dl);
    ctx.fillStyle = `rgb(${fc.join(',')})`;
    ctx.fillRect(0,0,CW,CH);

    // ── 2. SLUNCE / MĚSÍC / HVĚZDY ──
    drawSunMoon(t, dl, cloud, hour);

    // ── 3. MRAKY ──
    drawClouds(t);

    // ── 4. SVĚTELNÝ SMOG ──
    drawSmog(t, dl, cloud);

    // ── 5. MLHA ──
    drawFog(t);

    // ── 6. SRÁŽKY ──
    drawRain();

    // ── 7. BLESK ──
    if (raining && !isSnow(W) && W.rain>2 && cloud>90 && Math.random()<.008)
        triggerLightning();
    drawLightning(now);
}

requestAnimationFrame(frame);

// ═══════════════════════════════════════════════════════
// APLIKACE POČASÍ
// ═══════════════════════════════════════════════════════
function applyWeather(w) {
    W = w;

    const newP = isSnow(w)?'snow':w.rain>.1?'rain':'none';
    raining = w.rain>.1;
    if (newP!==precipType) {
        precipType=newP;
        raining?initRain():(drops=[]);
    } else if (raining&&!drops.length) initRain();

    cDensity = clamp((w.cloud-8)/92,0,1);
    cWind    = w.wind||0;
    cStorm   = w.name==='BOUŘE'?1:clamp(w.rain/6,0,.65);
    cDL      = getDL(w.hour??12);
    fDensity = isFog(w)?1.35:clamp((w.cloud-52)/32,0,.85);
    fWind    = w.wind||0;
    cloudCacheValid = false;

    // HUD — pouze v test módu
    if (mode !== 'test') return;
    const hr  = Math.floor(w.hour??0);
    const mn  = Math.round(((w.hour??0)-hr)*60);
    const dl  = getDL(w.hour??12);
    const tod = dl<.05?'noc':dl<.35?'soumrak':'';
    const lvl = isSnow(w)?0:rainLevel(w.rain||0);
    const rainDesc = ['','mrholení','déšť','silný déšť','průtrž'][lvl];
    document.getElementById('hud-name').textContent = w.name;
    document.getElementById('hud-sub').textContent  =
        `${w.temp}°C  ·  ${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`+
        (tod?'  ·  '+tod:'') +
        (rainDesc?'  ·  '+rainDesc:'');
}

// ═══════════════════════════════════════════════════════
// LIVE — OPEN-METEO API
// ═══════════════════════════════════════════════════════
async function fetchAndRender() {
    try {
        const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`+
            `&current=temperature_2m,precipitation,cloudcover,wind_speed_10m,wind_direction_10m`;
        const data=(await (await fetch(url)).json()).current;
        const hour=new Date().getHours()+new Date().getMinutes()/60;
        applyWeather({
            name:  guessName(data.temperature_2m, data.precipitation, data.cloudcover),
            temp:  data.temperature_2m,
            rain:  data.precipitation,
            cloud: data.cloudcover,
            wind:  Math.sin(data.wind_direction_10m*Math.PI/180),
            hour
        });
    } catch(e) {
        console.error('Open-Meteo fetch failed:', e);
    }
}

// ═══════════════════════════════════════════════════════
// TEST SLIDERY
// ═══════════════════════════════════════════════════════
function sliderUpdate() {
    const hour  = parseFloat(document.getElementById('sl-hour').value);
    const temp  = parseInt(document.getElementById('sl-temp').value);
    const cloud = parseInt(document.getElementById('sl-cloud').value);
    const rain  = parseFloat(document.getElementById('sl-rain').value);
    const wind  = parseFloat(document.getElementById('sl-wind').value);
    const hr=Math.floor(hour), mn=Math.round((hour-hr)*60);
    document.getElementById('sv-hour').textContent  = `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
    document.getElementById('sv-temp').textContent  = `${temp}°C`;
    document.getElementById('sv-cloud').textContent = `${cloud}%`;
    // Zobraz intenzitu deště slovně
    const lvl = rainLevel(rain);
    const desc = ['žádné','mrholení','déšť','silný déšť','průtrž'][lvl];
    document.getElementById('sv-rain').textContent  = rain>0 ? `${rain.toFixed(1)} · ${desc}` : '0.0';
    document.getElementById('sv-wind').textContent  = wind.toFixed(2);
    document.querySelectorAll('.p-btn').forEach(b=>b.classList.remove('on'));
    applyWeather({ name:guessName(temp,rain,cloud), temp, rain, cloud, wind, hour });
}

// ═══════════════════════════════════════════════════════
// PRESETY
// ═══════════════════════════════════════════════════════
const presetsEl = document.getElementById('presets');
PRESETS.forEach(p => {
    const b=document.createElement('button');
    b.className='p-btn'; b.textContent=p.name;
    b.onclick=()=>{
        document.querySelectorAll('.p-btn').forEach(x=>x.classList.remove('on'));
        b.classList.add('on');
        document.getElementById('sl-hour').value  = p.hour;
        document.getElementById('sl-temp').value  = p.temp;
        document.getElementById('sl-cloud').value = p.cloud;
        document.getElementById('sl-rain').value  = p.rain;
        document.getElementById('sl-wind').value  = p.wind;
        sliderUpdate(); b.classList.add('on');
    };
    presetsEl.appendChild(b);
});

// ═══════════════════════════════════════════════════════
// START — vždy live mód
// ═══════════════════════════════════════════════════════
initClouds();
initFog();
// Live mód je default — panel/hud jsou v CSS display:none
fetchAndRender();
liveTimer = setInterval(fetchAndRender, 60000);
</script>
