<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okno do dvora</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Courier New', monospace;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

#scene {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 480px;
    overflow: hidden;
    transition: background 0.6s ease;
}

#scene canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
}

#hud {
    position: absolute;
    top: 14px; left: 16px;
    z-index: 99;
    color: rgba(255,255,255,0.88);
    font-size: 12px;
    line-height: 1.9;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    pointer-events: none;
    transition: opacity 0.4s;
}

#hud-name {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2.5px;
    margin-bottom: 2px;
}

.live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ff5555;
    margin-right: 6px;
    animation: blink 1.4s infinite;
    vertical-align: middle;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.15; }
}

#hud-tag {
    position: absolute;
    top: 14px; right: 16px;
    z-index: 99;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.45);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
}

#panel {
    background: #111;
    padding: 14px 16px 16px;
    border-top: 1px solid #1e1e1e;
}

#tabs {
    display: flex;
    margin-bottom: 14px;
    border-bottom: 1px solid #1e1e1e;
}

.tab {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: #3a3a3a;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
    font-family: inherit;
}

.tab.on  { color: #bbb; border-bottom-color: #777; }
.tab:hover:not(.on) { color: #777; }

#p-live, #p-test { display: none; }
.p-on { display: block !important; }

.stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 10px;
}

.stat {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 5px;
    padding: 8px 10px;
    text-align: center;
}

.stat-lbl {
    font-size: 8px;
    color: #3a3a3a;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
}

.stat-val {
    font-size: 18px;
    color: #aaa;
    font-weight: bold;
}

.stat-unit {
    font-size: 8px;
    color: #444;
    margin-left: 1px;
}

#btn-refresh {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    color: #555;
    font-size: 9px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}

#btn-refresh:hover { border-color: #555; color: #aaa; }

#live-error {
    display: none;
    margin-top: 8px;
    font-size: 9px;
    color: #cc4444;
    text-align: center;
    letter-spacing: 0.5px;
}

.live-note {
    margin-top: 8px;
    font-size: 9px;
    color: #2e2e2e;
    text-align: center;
    letter-spacing: 0.3px;
    line-height: 1.6;
}

.sl-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.sl-row label {
    font-size: 9px;
    color: #444;
    letter-spacing: 1px;
    min-width: 74px;
}

.sl-row input[type=range] {
    flex: 1;
    accent-color: #777;
    height: 3px;
}

.sl-val {
    font-size: 10px;
    color: #999;
    min-width: 40px;
    text-align: right;
}

#presets {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
}

.p-btn {
    padding: 4px 9px;
    font-size: 8px;
    letter-spacing: 1px;
    background: #161616;
    border: 1px solid #252525;
    border-radius: 3px;
    color: #3a3a3a;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}

.p-btn:hover    { color: #888; border-color: #3a3a3a; }
.p-btn.on       { color: #ccc; border-color: #555; background: #1e1e1e; }
</style>
</head>
<body>

<div id="scene">
    <canvas id="c-clouds"></canvas>
    <canvas id="c-sun"></canvas>
    <canvas id="c-lp"></canvas>
    <canvas id="c-city"></canvas>
    <canvas id="c-rain"></canvas>
    <canvas id="c-fog"></canvas>
    <canvas id="c-lightning"></canvas>

    <div id="hud">
        <div id="hud-name">—</div>
        <div id="hud-sub"></div>
    </div>
    <div id="hud-tag">Praha · 50°N 14°E</div>
</div>

<div id="panel">
    <div id="tabs">
        <div class="tab on" id="tab-live" onclick="switchTab('live')">⬤ LIVE PRAHA</div>
        <div class="tab"    id="tab-test" onclick="switchTab('test')">◎ TEST REŽIM</div>
    </div>

    <!-- LIVE -->
    <div id="p-live" class="p-on">
        <div class="stat-grid">
            <div class="stat"><div class="stat-lbl">TEPLOTA</div><div class="stat-val" id="ls-temp">—</div><span class="stat-unit">°C</span></div>
            <div class="stat"><div class="stat-lbl">SRÁŽKY</div><div class="stat-val" id="ls-rain">—</div><span class="stat-unit">mm</span></div>
            <div class="stat"><div class="stat-lbl">OBLAČNOST</div><div class="stat-val" id="ls-cloud">—</div><span class="stat-unit">%</span></div>
            <div class="stat"><div class="stat-lbl">VÍTR</div><div class="stat-val" id="ls-wind">—</div><span class="stat-unit">km/h</span></div>
        </div>
        <button id="btn-refresh" onclick="fetchAndRender()">↻ AKTUALIZOVAT</button>
        <div id="live-error">Chyba načítání — zkontroluj připojení k internetu.</div>
        <div class="live-note">Data: Open-Meteo API · automatická aktualizace každou minutu</div>
    </div>

    <!-- TEST -->
    <div id="p-test">
        <div class="sl-row">
            <label>HODINA</label>
            <input type="range" id="sl-hour"  min="0"   max="23"  step="0.5" value="12" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-hour">12:00</span>
        </div>
        <div class="sl-row">
            <label>TEPLOTA</label>
            <input type="range" id="sl-temp"  min="-15" max="40"  step="1"   value="20" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-temp">20°C</span>
        </div>
        <div class="sl-row">
            <label>OBLAČNOST</label>
            <input type="range" id="sl-cloud" min="0"   max="100" step="1"   value="20" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-cloud">20%</span>
        </div>
        <div class="sl-row">
            <label>SRÁŽKY</label>
            <input type="range" id="sl-rain"  min="0"   max="8"   step="0.1" value="0"  oninput="sliderUpdate()">
            <span class="sl-val" id="sv-rain">0.0 mm</span>
        </div>
        <div class="sl-row">
            <label>VÍTR (směr)</label>
            <input type="range" id="sl-wind"  min="-1"  max="1"   step="0.05" value="0" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-wind">0.00</span>
        </div>
        <div class="sl-row">
            <label>MLHA</label>
            <input type="range" id="sl-vis"  min="0"  max="1"   step="1" value="0" oninput="sliderUpdate()">
            <span class="sl-val" id="sv-vis">ne</span>
        </div>
        <div id="presets"></div>
    </div>
</div>

<script>
const LAT = 50.1071;
const LON = 14.4473;
const SUNRISE = 6;
const SUNSET  = 20;
const TWILIGHT = 2;

// Fog threshold: visibility < 1000 m counts as fog (Open-Meteo visibility in metres)
const FOG_VISIBILITY_M = 1000;

const PRESETS = [
    { name:"VEDRO",     temp:35,  rain:0,   cloud:5,   wind:0,    hour:15, fog:false },
    { name:"JASNO",     temp:28,  rain:0,   cloud:10,  wind:0.2,  hour:9,  fog:false },
    { name:"POLOJASNO", temp:24,  rain:0,   cloud:35,  wind:0.15, hour:16, fog:false },
    { name:"JASNÁ NOC", temp:12,  rain:0,   cloud:0,   wind:0.1,  hour:1,  fog:false },
    { name:"OBLAČNO",   temp:16,  rain:0,   cloud:75,  wind:-0.5, hour:18, fog:false },
    { name:"MLHA",      temp:4,   rain:0,   cloud:98,  wind:0,    hour:5,  fog:true  },
    { name:"DÉŠŤ",      temp:14,  rain:0.5, cloud:85,  wind:0.8,  hour:13, fog:false },
    { name:"BOUŘE",     temp:19,  rain:6,   cloud:100, wind:1,    hour:21, fog:false },
    { name:"SNÍH",      temp:-3,  rain:0.7, cloud:100, wind:-0.3, hour:9,  fog:false }
];

let mode = 'live';
let currentWeather = null;
let drops = [], raining = false, precipType = null;
let cloudBands = [], fogPuffs = [];
let cloudState = { density:0, wind:0, storm:0, daylight:1 };
let fogState   = { density:0, wind:0 };
let liveTimer  = null;
let stars      = null;

const scene = document.getElementById('scene');
const CC = document.getElementById('c-clouds');
const SC = document.getElementById('c-sun');
const RC = document.getElementById('c-rain');
const FC = document.getElementById('c-fog');
const LC = document.getElementById('c-lightning');
const LP = document.getElementById('c-lp');
const CT = document.getElementById('c-city');

const cctx = CC.getContext('2d');
const sctx = SC.getContext('2d');
const rctx = RC.getContext('2d');
const fctx = FC.getContext('2d');
const lctx = LC.getContext('2d');
const lpctx = LP.getContext('2d');
const ctctx = CT.getContext('2d');

function W() { return scene.clientWidth  || window.innerWidth;  }
function H() { return scene.clientHeight || 480; }

function resizeAll() {
    [CC, SC, RC, FC, LC, LP, CT].forEach(c => { c.width = W(); c.height = H(); });
    cityBuildings = null; // rebuild on resize
}

window.addEventListener('resize', () => { resizeAll(); stars = null; });
resizeAll();

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;

function getDL(hour) {
    const ss = SUNRISE - TWILIGHT, se = SUNRISE + TWILIGHT;
    const ds = SUNSET  - TWILIGHT, de = SUNSET  + TWILIGHT;
    if (hour < ss || hour >= de) return 0;
    if (hour >= se && hour < ds) return 1;
    if (hour < se) return clamp((hour - ss) / (se - ss), 0, 1);
    return clamp(1 - (hour - ds) / (de - ds), 0, 1);
}

function getBG(temp, cloud) {
    const b =
        temp >= 30 ? [250,153,35]  :
        temp >= 20 ? [255,210,120] :
        temp >= 10 ? [180,210,255] :
        temp >  0  ? [160,190,255] :
                     [200,220,255];
    const m = (cloud / 100) * 0.6;
    return b.map(c => Math.round(c + (255 - c) * m));
}

function applyLight(rgb, dl) {
    const f = lerp(0.10, 1, dl);
    return rgb.map(c => Math.round(c * f));
}

// ── FOG detection: requires explicit fog flag (from visibility or preset)
// 100% cloud cover WITHOUT fog flag = thick overcast, NOT fog
function isSnow(s) { return s.temp <= 0 || s.name === 'SNÍH'; }
function isFog(s)  { return s.fog === true; }

function guessName(temp, rain, cloud, fog) {
    if (fog) return 'MLHA';
    if (temp <= 0 && rain > 0) return 'SNÍH';
    if (rain > 3  && cloud > 90) return 'BOUŘE';
    if (rain > 0.1) return 'DÉŠŤ';
    if (cloud >= 90 && !fog) return 'OBLAČNO';  // heavy overcast ≠ fog
    if (cloud > 70)  return 'OBLAČNO';
    if (cloud > 30)  return 'POLOJASNO';
    if (temp >= 30)  return 'VEDRO';
    return 'JASNO';
}

// ─────────────────────────────────────────────
// SVĚTELNÉ ZNEČIŠTĚNÍ
// ─────────────────────────────────────────────
function drawLightPollution(time) {
    lpctx.clearRect(0, 0, W(), H());

    if (!currentWeather) { requestAnimationFrame(drawLightPollution); return; }

    const hour  = currentWeather.hour ?? 12;
    const dl    = getDL(hour);
    const cloud = currentWeather.cloud / 100;
    const fog   = isFog(currentWeather) ? 1 : 0;

    // Only visible at night / dusk — fade out during day
    const nightT = clamp(1 - dl * 2.5, 0, 1);
    if (nightT < 0.01) { requestAnimationFrame(drawLightPollution); return; }

    // Clouds and fog reflect / scatter light — amplify with overcast
    const scatter = lerp(0.55, 1.35, cloud * 0.8 + fog * 0.5);
    const baseAlpha = nightT * scatter;

    // Horizon glow — warm amber/orange-red typical of Prague city glow
    const horizonY = H() * 0.78;

    // Wide horizon band — desaturated warm grey-amber, not pure orange
    const g1 = lpctx.createRadialGradient(W()*0.5, horizonY, 0, W()*0.5, horizonY, W()*0.72);
    g1.addColorStop(0,   `rgba(210,155,100,${baseAlpha * 0.20})`);
    g1.addColorStop(0.38,`rgba(185,130,85,${baseAlpha * 0.12})`);
    g1.addColorStop(0.72,`rgba(155,110,75,${baseAlpha * 0.05})`);
    g1.addColorStop(1,   'rgba(130,100,70,0)');
    lpctx.fillStyle = g1;
    lpctx.fillRect(0, 0, W(), H());

    // Secondary taller column — diffuse pinkish-grey city glow
    const g2 = lpctx.createRadialGradient(W()*0.5, H(), 0, W()*0.5, H(), H()*1.1);
    g2.addColorStop(0,   `rgba(195,145,110,${baseAlpha * 0.15})`);
    g2.addColorStop(0.4, `rgba(160,115,90,${baseAlpha * 0.08})`);
    g2.addColorStop(1,   'rgba(130,95,75,0)');
    lpctx.fillStyle = g2;
    lpctx.fillRect(0, 0, W(), H());

    // Slight violet-grey tint at upper sky (sodium lamp scattering)
    const g3 = lpctx.createLinearGradient(0, H()*0.35, 0, H());
    g3.addColorStop(0,   `rgba(70,55,75,0)`);
    g3.addColorStop(0.6, `rgba(100,75,85,${baseAlpha * 0.05})`);
    g3.addColorStop(1,   `rgba(130,100,80,${baseAlpha * 0.10})`);
    lpctx.fillStyle = g3;
    lpctx.fillRect(0, 0, W(), H());

    requestAnimationFrame(drawLightPollution);
}

// ─────────────────────────────────────────────
// RENDER VIZUÁLU
// ─────────────────────────────────────────────
function renderVisual(s) {
    const fog  = isFog(s);
    const fogI = fog ? 1 : 0;
    const snow = isSnow(s);
    const dl   = getDL(s.hour ?? 12);

    let blur = 0;
    if (s.rain > 0 && !fog) blur = 0.6;
    if (s.name === 'BOUŘE') blur = 1;
    if (snow) blur = Math.max(blur, 0.8);
    if (fog)  blur = 2.5;

    let bc = getBG(s.temp, s.cloud);
    if (snow) bc = [Math.round(bc[0]*0.72), Math.round(bc[1]*0.76), Math.round(bc[2]*0.84)];
    const fc2 = applyLight(bc, dl);
    scene.style.background = `rgb(${fc2.join(',')})`;

    const bri  = (snow ? lerp(0.52, 0.9, dl) : lerp(0.5, 1, dl)) - fogI * 0.03;
    const cont = 1 - fogI * 0.03;
    [CC, RC, FC, LC].forEach(c => {
        c.style.filter = `blur(${blur}px) brightness(${bri}) contrast(${cont})`;
    });
    SC.style.filter = `blur(${blur * 0.4}px) brightness(${bri})`;
}

// ─────────────────────────────────────────────
// SLUNCE + MĚSÍC + HVĚZDY
// ─────────────────────────────────────────────
function drawSunMoon(time) {
    sctx.clearRect(0, 0, W(), H());

    if (!currentWeather) { requestAnimationFrame(drawSunMoon); return; }

    const hour  = currentWeather.hour ?? 12;
    const dl    = getDL(hour);
    const cloud = currentWeather.cloud / 100;

    const sunT = clamp((hour - 6) / 14, 0, 1);
    const sunX = W() * 0.1 + W() * 0.8 * sunT;
    const sunY = H() * 0.55 - Math.sin(sunT * Math.PI) * H() * 0.48;

    if (dl > 0.05 && cloud < 0.88) {
        const op = (1 - cloud) * dl * 0.92;
        const g1 = sctx.createRadialGradient(sunX, sunY, 6, sunX, sunY, 70);
        g1.addColorStop(0,   `rgba(255,240,180,${op * 0.55})`);
        g1.addColorStop(0.45,`rgba(255,220,100,${op * 0.18})`);
        g1.addColorStop(1,   'rgba(255,200,80,0)');
        sctx.fillStyle = g1;
        sctx.beginPath(); sctx.arc(sunX, sunY, 70, 0, Math.PI * 2); sctx.fill();

        sctx.fillStyle = `rgba(255,242,165,${op})`;
        sctx.beginPath(); sctx.arc(sunX, sunY, 18, 0, Math.PI * 2); sctx.fill();
    }

    if (dl < 0.15) {
        const nightT = 1 - dl / 0.15;

        if (!stars) {
            stars = [];
            for (let i = 0; i < 90; i++) {
                stars.push([
                    Math.random() * W(),
                    Math.random() * H() * 0.72,
                    Math.random() * 1.5 + 0.3,
                    Math.random() * Math.PI * 2
                ]);
            }
        }

        // Stars dimmed by light pollution (cloud scatter makes LP worse → fewer stars)
        const lpDim = clamp(1 - cloud * 1.1, 0, 1);

        for (const [sx, sy, sr, sp] of stars) {
            const twinkle = 0.5 + Math.sin(time * 0.0011 * 1.3 + sp) * 0.5;
            sctx.fillStyle = `rgba(255,255,255,${nightT * (0.25 + 0.55 * twinkle) * Math.max(0, 1 - cloud * 2.2) * lpDim})`;
            sctx.beginPath(); sctx.arc(sx, sy, sr, 0, Math.PI * 2); sctx.fill();
        }

        const moonRaw = hour < 6 ? hour + 24 : hour;
        const moonT   = clamp((moonRaw - 20) / 14, 0, 1);
        const moonX   = W() * 0.08 + W() * 0.84 * moonT;
        const moonY   = H() * 0.58 - Math.sin(moonT * Math.PI) * H() * 0.45;
        const moonOp  = nightT * Math.max(0, 1 - cloud * 1.6) * 0.9;

        if (moonOp > 0.02) {
            const mg = sctx.createRadialGradient(moonX, moonY, 3, moonX, moonY, 30);
            mg.addColorStop(0, `rgba(220,235,255,${moonOp * 0.45})`);
            mg.addColorStop(1, 'rgba(200,220,255,0)');
            sctx.fillStyle = mg;
            sctx.beginPath(); sctx.arc(moonX, moonY, 30, 0, Math.PI * 2); sctx.fill();

            sctx.fillStyle = `rgba(230,240,255,${moonOp})`;
            sctx.beginPath(); sctx.arc(moonX, moonY, 11, 0, Math.PI * 2); sctx.fill();
        }
    }

    requestAnimationFrame(drawSunMoon);
}

// ─────────────────────────────────────────────
// MRAKY
// ─────────────────────────────────────────────
function createBand(i) {
    const layer = i % 3;
    return {
        x: Math.random() * (W() + 600) - 300,
        y: H() * (0.08 + layer * 0.14) + Math.random() * H() * 0.08,
        w: Math.random() * 500 + 900,
        h: Math.random() * 120 + 140,
        speed: 0.03 + Math.random() * 0.06,
        wobble: Math.random() * Math.PI * 2,
        driftY: (Math.random() - 0.5) * 0.015,
        layer
    };
}

function initClouds() {
    cloudBands = [];
    for (let i = 0; i < 7; i++) cloudBands.push(createBand(i));
}

function updateCloudState(w) {
    cloudState.density = clamp((w.cloud - 8) / 92, 0, 1);
    cloudState.wind    = w.wind || 0;
    cloudState.storm   = w.name === 'BOUŘE' ? 1 : clamp(w.rain / 6, 0, 0.65);
    cloudState.daylight = getDL(w.hour ?? 12);
}

function drawClouds(time) {
    cctx.clearRect(0, 0, W(), H());

    if (cloudState.density > 0.02) {
        const t  = time * 0.001;
        const wp = cloudState.wind * 0.12;
        const ba = cloudState.density * 0.1;
        const sh = Math.round(lerp(244, 196, cloudState.storm) * lerp(0.68, 1, cloudState.daylight));
        const col = `${sh},${sh+3},${sh+6}`;

        for (const b of cloudBands) {
            b.x += b.speed + wp * (1 + b.layer * 0.18);
            b.y += b.driftY + Math.sin(t * 0.08 + b.wobble) * 0.015;

            if (b.x - b.w > W() + 300) { b.x = -b.w - Math.random()*260; b.y = H()*(0.08+b.layer*0.14)+Math.random()*H()*0.08; }
            if (b.x + b.w < -320)       { b.x = W()+b.w+Math.random()*260; b.y = H()*(0.08+b.layer*0.14)+Math.random()*H()*0.08; }

            const pulse = 0.95 + Math.sin(t * (0.06 + b.layer * 0.015) + b.wobble) * 0.04;
            const alpha = ba * (0.78 + b.layer * 0.08) * pulse;

            const g1 = cctx.createLinearGradient(b.x-b.w*0.6, b.y, b.x+b.w*0.6, b.y+b.h*0.15);
            g1.addColorStop(0,    `rgba(${col},0)`);
            g1.addColorStop(0.18, `rgba(${col},${alpha*0.12})`);
            g1.addColorStop(0.5,  `rgba(${col},${alpha*0.34})`);
            g1.addColorStop(0.82, `rgba(${col},${alpha*0.12})`);
            g1.addColorStop(1,    `rgba(${col},0)`);
            cctx.fillStyle = g1;
            cctx.beginPath(); cctx.ellipse(b.x, b.y, b.w*0.52, b.h*0.52, 0, 0, Math.PI*2); cctx.fill();

            const g2 = cctx.createLinearGradient(b.x, b.y-b.h*0.7, b.x, b.y+b.h*0.7);
            g2.addColorStop(0,    `rgba(${col},0)`);
            g2.addColorStop(0.35, `rgba(${col},${alpha*0.12})`);
            g2.addColorStop(0.5,  `rgba(${col},${alpha*0.18})`);
            g2.addColorStop(1,    `rgba(${col},0)`);
            cctx.fillStyle = g2;
            cctx.beginPath(); cctx.ellipse(b.x, b.y, b.w*0.42, b.h*0.78, 0, 0, Math.PI*2); cctx.fill();
        }

        cctx.fillStyle = `rgba(${col},${ba*0.26})`;
        cctx.fillRect(0, 0, W(), H() * 0.78);
    }

    requestAnimationFrame(drawClouds);
}

// ─────────────────────────────────────────────
// MLHA
// ─────────────────────────────────────────────
function createPuff(i) {
    const layer = i % 3;
    const scale = layer === 0 ? 1.25 : layer === 1 ? 1 : 0.82;
    return {
        x: Math.random() * W(),
        y: Math.random() * H(),
        r: (Math.random() * 180 + 140) * scale,
        baseAlpha: 0.03 + Math.random() * 0.04,
        speed: 0.08 + Math.random() * 0.2,
        wobble: Math.random() * Math.PI * 2,
        driftY: (Math.random() - 0.5) * 0.12,
        layer
    };
}

function initFog() {
    fogPuffs = [];
    for (let i = 0; i < 64; i++) fogPuffs.push(createPuff(i));
}

function updateFogState(w) {
    // Fog only when fog flag is set — NOT from cloud cover alone
    fogState.density = isFog(w) ? 1.35 : clamp((w.cloud - 80) / 20, 0, 0.25);
    fogState.wind    = w.wind || 0;
}

function drawFog(time) {
    fctx.clearRect(0, 0, W(), H());

    if (fogState.density > 0.01) {
        const t  = time * 0.001;
        const wp = fogState.wind * 0.42;
        const bo = fogState.density * 0.5;

        for (const p of fogPuffs) {
            p.x += p.speed * 1.35 + wp * (1 + p.layer * 0.45);
            p.y += p.driftY * 1.4 + Math.sin(t * 0.42 + p.wobble) * 0.08;

            if (p.x - p.r > W() + 80)  { p.x = -p.r - Math.random()*120; p.y = Math.random()*H(); }
            if (p.x + p.r < -120)       { p.x = W()+p.r+Math.random()*120; p.y = Math.random()*H(); }
            if (p.y < -p.r)  p.y = H() + p.r;
            if (p.y > H()+p.r) p.y = -p.r;

            const pulse = 0.8 + Math.sin(t * (0.42 + p.layer * 0.1) + p.wobble) * 0.24;
            const alpha = p.baseAlpha * bo * pulse;

            const g = fctx.createRadialGradient(p.x, p.y, p.r*0.15, p.x, p.y, p.r);
            g.addColorStop(0,    `rgba(245,248,250,${alpha})`);
            g.addColorStop(0.55, `rgba(245,248,250,${alpha*0.68})`);
            g.addColorStop(1,    'rgba(245,248,250,0)');
            fctx.fillStyle = g;
            fctx.beginPath(); fctx.arc(p.x, p.y, p.r, 0, Math.PI*2); fctx.fill();
        }

        fctx.fillStyle = `rgba(245,248,250,${bo*0.18})`;
        fctx.fillRect(0, 0, W(), H());
    }

    requestAnimationFrame(drawFog);
}

// ─────────────────────────────────────────────
// MĚSTSKÁ SILUETA
// ─────────────────────────────────────────────
function buildCity() {
    const w = W(), h = H();
    const buildings = [];
    const seed = 42; // fixed layout
    let rng = seed;
    const rand = () => { rng = (rng * 1664525 + 1013904223) & 0xffffffff; return (rng >>> 0) / 0xffffffff; };

    // Base horizon sits at ~78% height
    const baseY = h * 0.78;

    let x = -20;
    while (x < w + 60) {
        const bw  = rand() * 38 + 18;
        const bh  = rand() * h * 0.28 + h * 0.06;
        const by  = baseY - bh;
        // Some taller landmark buildings scattered in
        const tall = rand() < 0.12;
        const bh2  = tall ? bh * 1.8 : bh;
        const by2  = baseY - bh2;

        // Window rows
        const windows = [];
        const cols = Math.floor(bw / 7);
        const rows = Math.floor(bh2 / 9);
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (rand() < 0.55) {
                    windows.push({ cx: c, cy: r, lit: rand() < 0.38 });
                }
            }
        }

        buildings.push({ x, y: by2, w: bw, h: bh2, windows, cols, rows, tall });
        x += bw + rand() * 6 + 1;
    }
    return buildings;
}

function drawCity(time) {
    ctctx.clearRect(0, 0, W(), H());

    if (!currentWeather) { requestAnimationFrame(drawCity); return; }

    const dl    = getDL(currentWeather.hour ?? 12);
    const fog   = isFog(currentWeather);
    const fogI  = fog ? 1 : 0;
    const cloud = currentWeather.cloud / 100;
    const night = 1 - dl;
    const vis   = fog ? clamp(1 - fogI * 0.85, 0.05, 0.5) : clamp(1 - cloud * 0.35, 0.25, 1);

    if (!cityBuildings) cityBuildings = buildCity();

    const baseY = H() * 0.78;

    // Ground fill
    const gGrad = ctctx.createLinearGradient(0, baseY, 0, H());
    const gr = fog ? 40 : Math.round(lerp(20, 35, dl));
    gGrad.addColorStop(0, `rgba(${gr},${gr+2},${gr+4},${vis * 0.92})`);
    gGrad.addColorStop(1, `rgba(${gr-5},${gr-3},${gr-1},${vis})`);
    ctctx.fillStyle = gGrad;
    ctctx.fillRect(0, baseY, W(), H() - baseY);

    for (const b of cityBuildings) {
        // Building body — slightly different shade per building for depth
        const shade = fog
            ? Math.round(lerp(38, 58, Math.random() * 0 + 0.5))
            : Math.round(lerp(18, 42, dl) + (b.tall ? 4 : 0));

        ctctx.fillStyle = `rgba(${shade},${shade+1},${shade+3},${vis})`;
        ctctx.fillRect(b.x, b.y, b.w, b.h);

        // Subtle top edge highlight (moonlight / light pollution rim)
        const rimAlpha = night * (fog ? 0.04 : clamp(1 - cloud * 1.2, 0, 0.12));
        if (rimAlpha > 0.01) {
            ctctx.fillStyle = `rgba(200,210,220,${rimAlpha})`;
            ctctx.fillRect(b.x, b.y, b.w, 1.5);
        }

        // Windows — only visible at night / low light
        if (dl < 0.7) {
            const wOpacity = clamp((1 - dl * 1.4) * vis * 0.9, 0, 1);
            if (wOpacity > 0.05) {
                const ww = 3.5, wh = 3.5, px = 6, py = 8;
                for (const win of b.windows) {
                    const wx = b.x + 3 + win.cx * px;
                    const wy = b.y + 5 + win.cy * py;
                    if (wx + ww > b.x + b.w - 2) continue;
                    if (wy + wh > b.y + b.h - 2) continue;
                    if (win.lit) {
                        ctctx.fillStyle = `rgba(255,235,150,${wOpacity * 0.85})`;
                    } else {
                        ctctx.fillStyle = `rgba(60,80,100,${wOpacity * 0.25})`;
                    }
                    ctctx.fillRect(wx, wy, ww, wh);
                }
            }
        }
    }

    // Visibility haze overlay — fog makes buildings wash out
    if (fog || cloud > 0.7) {
        const hazeAlpha = fog ? 0.55 : cloud * 0.18;
        const hazeGrad = ctctx.createLinearGradient(0, H() * 0.55, 0, H());
        hazeGrad.addColorStop(0, `rgba(200,210,215,0)`);
        hazeGrad.addColorStop(0.4, `rgba(200,210,215,${hazeAlpha * 0.4})`);
        hazeGrad.addColorStop(1, `rgba(200,210,215,${hazeAlpha})`);
        ctctx.fillStyle = hazeGrad;
        ctctx.fillRect(0, H() * 0.55, W(), H() * 0.45);
    }

    requestAnimationFrame(drawCity);
}

// ─────────────────────────────────────────────
// BLESK
// ─────────────────────────────────────────────
function triggerLightning() {
    lctx.fillStyle = 'rgba(255,255,255,0.9)';
    lctx.fillRect(0, 0, W(), H());
    setTimeout(() => { lctx.clearRect(0, 0, W(), H()); }, 120);
    setTimeout(() => {
        if (Math.random() > 0.5) {
            lctx.fillStyle = 'rgba(255,255,255,0.6)';
            lctx.fillRect(0, 0, W(), H());
            setTimeout(() => lctx.clearRect(0, 0, W(), H()), 80);
        }
    }, 180);
}

// ─────────────────────────────────────────────
// SRÁŽKY  (intenzita 0–8 mm/h)
//   0.0–0.5  slabý déšť  — tenké krátké kapky, malá hustota
//   0.5–2.0  mírný déšť  — středně dlouhé kapky
//   2.0–5.0  silný déšť  — dlouhé silné kapky, více kapek
//   5.0+     průtrž      — maximální délka, šířka, hustota
// ─────────────────────────────────────────────
function rainParams(rainMm, snow) {
    if (snow) return { count: 400, lengthMin: 0, lengthMax: 0, speedMin: 0.5, speedMax: 1.8, radMin: 1.0, radMax: 2.8, lw: 0, alpha: 0.95 };
    const r = clamp(rainMm, 0.1, 8);
    if (r < 0.5) return  { count: 160, lengthMin: 10, lengthMax: 22, speedMin: 3,   speedMax: 7,  lw: 1.0, alpha: 0.55 };
    if (r < 2.0) return  { count: 280, lengthMin: 18, lengthMax: 36, speedMin: 5,   speedMax: 10, lw: 1.3, alpha: 0.72 };
    if (r < 5.0) return  { count: 420, lengthMin: 28, lengthMax: 52, speedMin: 7,   speedMax: 14, lw: 1.8, alpha: 0.85 };
    return               { count: 560, lengthMin: 38, lengthMax: 68, speedMin: 10,  speedMax: 18, lw: 2.4, alpha: 0.92 };
}

function createDrop(snow, params) {
    const p = params || rainParams(currentWeather?.rain ?? 0.5, snow);
    return {
        x:     Math.random() * (W() + 240) - 120,
        y:     Math.random() * (H() + 240) - 240,
        l:     snow ? 0 : p.lengthMin + Math.random() * (p.lengthMax - p.lengthMin),
        s:     snow ? p.speedMin + Math.random() * (p.speedMax - p.speedMin)
                    : p.speedMin + Math.random() * (p.speedMax - p.speedMin),
        r:     snow ? p.radMin + Math.random() * (p.radMax - p.radMin) : 0,
        drift: snow ? Math.random() * 0.6 + 0.2 : 0
    };
}

function initRain() {
    const snow = isSnow(currentWeather ?? {});
    const p = rainParams(currentWeather?.rain ?? 0.5, snow);
    drops = [];
    for (let i = 0; i < p.count; i++) drops.push(createDrop(snow, p));
}

function drawRain() {
    const wind  = currentWeather?.wind || 0;
    const angle = wind * 8;
    const snow  = isSnow(currentWeather ?? {});
    const rainMm = currentWeather?.rain ?? 0.5;
    const p = raining ? rainParams(rainMm, snow) : null;

    rctx.clearRect(0, 0, W(), H());

    if (raining && p) {
        if (snow) {
            rctx.fillStyle = `rgba(235,240,245,${p.alpha})`;
        } else {
            // Heavier rain = slightly brighter, more visible streaks
            const heavy = clamp(rainMm / 5, 0, 1);
            const r = Math.round(lerp(110, 190, heavy));
            const g = Math.round(lerp(130, 210, heavy));
            const b2 = Math.round(lerp(150, 230, heavy));
            rctx.strokeStyle = `rgba(${r},${g},${b2},${p.alpha})`;
            rctx.lineWidth = p.lw;
        }

        for (const d of drops) {
            if (snow) {
                rctx.beginPath(); rctx.arc(d.x, d.y, d.r, 0, Math.PI*2); rctx.fill();
                d.y += d.s;
                d.x += wind * d.drift;
            } else {
                rctx.beginPath(); rctx.moveTo(d.x, d.y); rctx.lineTo(d.x + angle, d.y + d.l); rctx.stroke();
                d.y += d.s;
                d.x += wind * 2;
            }

            const pad = 120;
            if (d.y > H() + pad || d.x < -pad*2 || d.x > W() + pad*2) {
                const nd = createDrop(snow, p);
                d.x = Math.random() * (W() + pad*2) - pad;
                d.y = -Math.random() * pad - (snow ? nd.r * 2 : nd.l);
                d.l = nd.l; d.s = nd.s; d.r = nd.r; d.drift = nd.drift;
            }
        }

        if (!snow && rainMm > 2 && currentWeather.cloud > 90 && Math.random() < 0.01) {
            triggerLightning();
        }
    }

    requestAnimationFrame(drawRain);
}

// ─────────────────────────────────────────────
// APLIKACE POČASÍ
// ─────────────────────────────────────────────
function rainBucket(w) {
    if (!w || w.rain <= 0.1) return 'none';
    if (isSnow(w)) return 'snow';
    if (w.rain < 0.5) return 'light';
    if (w.rain < 2.0) return 'moderate';
    if (w.rain < 5.0) return 'heavy';
    return 'torrential';
}

function applyWeather(w) {
    currentWeather = w;

    const newP = rainBucket(w);
    raining = w.rain > 0.1;

    if (newP !== precipType) {
        precipType = newP;
        raining ? initRain() : (drops = []);
    } else if (raining && drops.length === 0) {
        initRain();
    }

    updateCloudState(w);
    updateFogState(w);
    renderVisual(w);

    // HUD: hide completely in live mode
    const hudEl = document.getElementById('hud');
    if (mode === 'live') {
        hudEl.style.opacity = '0';
        hudEl.style.pointerEvents = 'none';
    } else {
        hudEl.style.opacity = '1';
        hudEl.style.pointerEvents = 'none';

        const hr  = Math.floor(w.hour ?? 0);
        const mn  = Math.round(((w.hour ?? 0) - hr) * 60);
        const dl  = getDL(w.hour ?? 12);
        const tod = dl < 0.05 ? 'noc' : dl < 0.35 ? 'soumrak / svítání' : '';

        document.getElementById('hud-name').textContent = w.name;
        document.getElementById('hud-sub').textContent =
            `${w.temp}°C  ·  ${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}` +
            (tod ? '  ·  ' + tod : '');
    }
}

// ─────────────────────────────────────────────
// LIVE — OPEN-METEO API
// weathercode field used for fog detection (codes 45, 48 = fog/rime)
// visibility field as fallback
// ─────────────────────────────────────────────
async function fetchAndRender() {
    const btn = document.getElementById('btn-refresh');
    const err = document.getElementById('live-error');
    btn.textContent = '↻ NAČÍTÁM...';
    err.style.display = 'none';

    try {
        const url = `https://api.open-meteo.com/v1/forecast` +
            `?latitude=${LAT}&longitude=${LON}` +
            `&current=temperature_2m,precipitation,cloudcover,wind_speed_10m,wind_direction_10m,weathercode,visibility`;

        const res  = await fetch(url);
        const data = await res.json();
        const c    = data.current;

        // Fog: weathercode 45 or 48 = fog / depositing rime fog
        // Also treat very low visibility (< 1000 m) as fog
        const weathercode = c.weathercode ?? 0;
        const visibility  = c.visibility  ?? 99999;
        const fog = (weathercode === 45 || weathercode === 48) || (visibility < FOG_VISIBILITY_M);

        const windSign = Math.sin(c.wind_direction_10m * Math.PI / 180);
        const hour     = new Date().getHours() + new Date().getMinutes() / 60;
        const name     = guessName(c.temperature_2m, c.precipitation, c.cloudcover, fog);

        document.getElementById('ls-temp').textContent  = c.temperature_2m.toFixed(1);
        document.getElementById('ls-rain').textContent  = c.precipitation.toFixed(1);
        document.getElementById('ls-cloud').textContent = c.cloudcover;
        document.getElementById('ls-wind').textContent  = Math.round(c.wind_speed_10m);

        applyWeather({
            name,
            temp:  c.temperature_2m,
            rain:  c.precipitation,
            cloud: c.cloudcover,
            wind:  windSign,
            hour,
            fog
        });

        btn.textContent = '↻ AKTUALIZOVAT';

    } catch (e) {
        console.error('Open-Meteo fetch failed:', e);
        document.getElementById('live-error').style.display = 'block';
        btn.textContent = '↻ AKTUALIZOVAT';
    }
}

// ─────────────────────────────────────────────
// TEST — SLIDERY
// ─────────────────────────────────────────────
function sliderUpdate() {
    const hour  = parseFloat(document.getElementById('sl-hour').value);
    const temp  = parseInt(document.getElementById('sl-temp').value);
    const cloud = parseInt(document.getElementById('sl-cloud').value);
    const rain  = parseFloat(document.getElementById('sl-rain').value);
    const wind  = parseFloat(document.getElementById('sl-wind').value);
    const fog   = parseInt(document.getElementById('sl-vis').value) === 1;

    const hr = Math.floor(hour);
    const mn = Math.round((hour - hr) * 60);
    document.getElementById('sv-hour').textContent  = `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
    document.getElementById('sv-temp').textContent  = `${temp}°C`;
    document.getElementById('sv-cloud').textContent = `${cloud}%`;
    document.getElementById('sv-rain').textContent  = `${rain.toFixed(1)} mm`;
    document.getElementById('sv-wind').textContent  = wind.toFixed(2);
    document.getElementById('sv-vis').textContent   = fog ? 'ano' : 'ne';

    document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('on'));

    applyWeather({ name: guessName(temp, rain, cloud, fog), temp, rain, cloud, wind, hour, fog });
}

// ─────────────────────────────────────────────
// ZÁLOŽKY
// ─────────────────────────────────────────────
function switchTab(t) {
    mode = t;
    document.getElementById('tab-live').classList.toggle('on', t === 'live');
    document.getElementById('tab-test').classList.toggle('on', t === 'test');
    document.getElementById('p-live').classList.toggle('p-on', t === 'live');
    document.getElementById('p-test').classList.toggle('p-on', t === 'test');

    if (t === 'live') {
        fetchAndRender();
        if (liveTimer) clearInterval(liveTimer);
        liveTimer = setInterval(fetchAndRender, 60000);
    } else {
        if (liveTimer) clearInterval(liveTimer);
        sliderUpdate();
    }
}

// ─────────────────────────────────────────────
// PŘEDVOLBY
// ─────────────────────────────────────────────
const presetsEl = document.getElementById('presets');
PRESETS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'p-btn';
    b.textContent = p.name;
    b.onclick = () => {
        document.querySelectorAll('.p-btn').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        document.getElementById('sl-hour').value  = p.hour;
        document.getElementById('sl-temp').value  = p.temp;
        document.getElementById('sl-cloud').value = p.cloud;
        document.getElementById('sl-rain').value  = p.rain;
        document.getElementById('sl-wind').value  = p.wind;
        document.getElementById('sl-vis').value   = p.fog ? 1 : 0;
        sliderUpdate();
        b.classList.add('on');
    };
    presetsEl.appendChild(b);
});

document.addEventListener('keydown', e => {
    if (mode !== 'test') return;
    const btns = [...document.querySelectorAll('.p-btn')];
    const cur  = btns.findIndex(b => b.classList.contains('on'));
    let next   = cur;
    if (e.key === 'ArrowRight') next = (cur + 1) % btns.length;
    if (e.key === 'ArrowLeft')  next = (cur - 1 + btns.length) % btns.length;
    if (next !== cur) btns[next].click();
});

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
initClouds();
initFog();

requestAnimationFrame(drawClouds);
requestAnimationFrame(drawFog);
requestAnimationFrame(drawSunMoon);
requestAnimationFrame(drawLightPollution);
requestAnimationFrame(drawCity);
drawRain();

fetchAndRender();
liveTimer = setInterval(fetchAndRender, 60000);
</script>
