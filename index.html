<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okno do dvora</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Courier New', monospace;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

#scene {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 480px;
    overflow: hidden;
}

#scene canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
}

#hud {
    position: absolute;
    top: 14px; left: 16px;
    z-index: 99;
    color: rgba(255,255,255,0.88);
    font-size: 12px;
    line-height: 1.9;
}

#hud-tag {
    position: absolute;
    top: 14px; right: 16px;
    font-size: 9px;
    color: rgba(255,255,255,0.45);
}
</style>
</head>
<body>

<div id="scene">
    <canvas id="c-clouds"></canvas>
    <canvas id="c-sun"></canvas>
    <canvas id="c-rain"></canvas>
    <canvas id="c-fog"></canvas>
    <canvas id="c-lightning"></canvas>

    <div id="hud">
        <div id="hud-name">—</div>
        <div id="hud-sub"></div>
    </div>
    <div id="hud-tag">Praha</div>
</div>

<script>

// ─────────────────────────────
// SAFE FPS LIMIT (NOVÉ)
// ─────────────────────────────
let lastFrame = 0;
const FPS = 30;
const FRAME_INTERVAL = 1000 / FPS;

function fpsGate(time){
    if (time - lastFrame < FRAME_INTERVAL) return false;
    lastFrame = time;
    return true;
}

// ─────────────────────────────
// CANVAS
// ─────────────────────────────
const scene = document.getElementById('scene');
const CC = document.getElementById('c-clouds');
const SC = document.getElementById('c-sun');
const RC = document.getElementById('c-rain');
const FC = document.getElementById('c-fog');
const LC = document.getElementById('c-lightning');

const cctx = CC.getContext('2d');
const sctx = SC.getContext('2d');
const rctx = RC.getContext('2d');
const fctx = FC.getContext('2d');
const lctx = LC.getContext('2d');

function W(){return scene.clientWidth;}
function H(){return scene.clientHeight;}

// ─────────────────────────────
// REDUKCE ZÁTĚŽE
// ─────────────────────────────
const STAR_COUNT = 45;
const RAIN_COUNT = 220;
const FOG_COUNT = 32;

// ─────────────────────────────
// STAV
// ─────────────────────────────
let stars = null;
let drops = [];

// ─────────────────────────────
// CLOUDS (SAFE FPS)
// ─────────────────────────────
function drawClouds(time){
    if(!fpsGate(time)){
        requestAnimationFrame(drawClouds);
        return;
    }

    cctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawClouds);
}

// ─────────────────────────────
// FOG (SAFE FPS)
// ─────────────────────────────
function drawFog(time){
    if(!fpsGate(time)){
        requestAnimationFrame(drawFog);
        return;
    }

    fctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawFog);
}

// ─────────────────────────────
// SUN (SAFE FPS)
// ─────────────────────────────
function drawSun(time){
    if(!fpsGate(time)){
        requestAnimationFrame(drawSun);
        return;
    }

    sctx.clearRect(0,0,W(),H());
    requestAnimationFrame(drawSun);
}

// ─────────────────────────────
// INIT STARS (MENŠÍ ZÁTĚŽ)
// ─────────────────────────────
function initStars(){
    stars = [];
    for(let i=0;i<STAR_COUNT;i++){
        stars.push([
            Math.random()*W(),
            Math.random()*H()*0.7
        ]);
    }
}

// ─────────────────────────────
// START
// ─────────────────────────────
initStars();

requestAnimationFrame(drawClouds);
requestAnimationFrame(drawFog);
requestAnimationFrame(drawSun);

</script>

</body>
</html>
